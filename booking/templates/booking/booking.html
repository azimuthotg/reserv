<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>จองพื้นที่บริการ — Library@NPU</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <style>
        body { background: #f5f5f5; font-family: 'Sarabun', sans-serif; }
        #loader {
            position: fixed; inset: 0; display: flex; flex-direction: column;
            justify-content: center; align-items: center;
            background: #fff; z-index: 9999; gap: 16px;
        }
        .spinner {
            width: 48px; height: 48px; border: 5px solid #e0e0e0;
            border-top-color: #06C755; border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        #booking-form { display: none; }

        .room-banner {
            background: linear-gradient(135deg, #06C755, #00a844);
            color: #fff; padding: 16px; border-radius: 12px; margin-bottom: 12px;
        }
        .user-info-bar {
            background: #fff; border-radius: 10px; padding: 10px 14px;
            margin-bottom: 12px; box-shadow: 0 1px 4px rgba(0,0,0,.07);
            display: flex; align-items: center; gap: 10px;
        }
        .user-avatar {
            width: 36px; height: 36px; border-radius: 50%;
            background: #06C755; color: #fff; display: flex;
            align-items: center; justify-content: center;
            font-size: 16px; font-weight: 700; flex-shrink: 0;
        }
        .user-name { font-size: 15px; font-weight: 600; color: #222; line-height: 1.2; }
        .user-sub  { font-size: 12px; color: #888; margin-top: 2px; }

        .section-card {
            background: #fff; border-radius: 12px;
            padding: 16px; margin-bottom: 12px; box-shadow: 0 1px 4px rgba(0,0,0,.08);
        }
        .section-title { font-size: 12px; color: #aaa; margin-bottom: 12px; font-weight: 700; text-transform: uppercase; letter-spacing: .6px; }
        .field-label { font-size: 13px; color: #555; margin-bottom: 4px; }

        /* Quick booking buttons */
        .quick-btns { display: flex; gap: 8px; margin-bottom: 12px; }
        .btn-quick {
            flex: 1; padding: 10px 6px; border-radius: 10px; border: 2px solid #06C755;
            background: #fff; color: #06C755; font-size: 13px; font-weight: 600;
            cursor: pointer; text-align: center; transition: all .15s;
        }
        .btn-quick:active, .btn-quick.active {
            background: #06C755; color: #fff;
        }
        .btn-quick.disabled {
            border-color: #ddd; color: #bbb; cursor: not-allowed; background: #fafafa;
        }
        .btn-quick .q-label { font-size: 14px; }
        .btn-quick .q-time  { font-size: 11px; opacity: .75; margin-top: 2px; }
        .btn-quick .q-badge {
            font-size: 10px; background: #ffecec; color: #c00;
            border-radius: 4px; padding: 1px 5px; margin-top: 3px; display: inline-block;
        }

        /* Divider */
        .or-divider {
            display: flex; align-items: center; gap: 8px;
            color: #bbb; font-size: 12px; margin: 12px 0;
        }
        .or-divider::before, .or-divider::after {
            content: ''; flex: 1; height: 1px; background: #e8e8e8;
        }

        /* Booking list */
        .booking-list { margin-top: 10px; }
        .booking-item {
            display: flex; justify-content: space-between; align-items: flex-start;
            padding: 8px 10px; background: #fff8e1; border-radius: 8px;
            margin-bottom: 6px; font-size: 13px;
        }
        .booking-time { font-weight: 700; color: #e67e00; white-space: nowrap; padding-top: 1px; }
        .booking-right { text-align: right; max-width: 58%; }
        .booking-group { color: #333; font-weight: 600; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
        .booking-booker { color: #888; font-size: 11px; margin-top: 1px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
        .no-booking { color: #06C755; font-size: 13px; text-align: center; padding: 8px 0; }

        .btn-submit { background: #06C755; color: #fff; border: none; border-radius: 10px; padding: 14px; font-size: 16px; font-weight: 600; width: 100%; }
        .btn-submit:active { background: #059944; }
        .btn-submit:disabled { background: #b2dfdb; }
    </style>
</head>
<body>

<div id="loader">
    <div class="spinner"></div>
    <div style="color:#888;font-size:14px;">กำลังโหลด...</div>
</div>

<div id="booking-form" class="container py-3" style="max-width:480px;">

    <!-- Room Banner -->
    <div class="room-banner" id="room-banner">
        <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:4px;">
            <div style="font-size:18px;font-weight:700;" id="room-name">—</div>
            <a href="../" style="color:rgba(255,255,255,.8);font-size:12px;text-decoration:none;
               background:rgba(255,255,255,.2);border-radius:16px;padding:3px 10px;
               border:1px solid rgba(255,255,255,.35);white-space:nowrap;">← หน้าหลัก</a>
        </div>
        <div style="font-size:13px;opacity:.85;" id="room-location"></div>
        <div style="font-size:13px;opacity:.85;" id="room-hours"></div>
    </div>

    <!-- User Info — compact -->
    <div class="user-info-bar">
        <div class="user-avatar" id="user-avatar">?</div>
        <div>
            <div class="user-name" id="disp-fullname">—</div>
            <div class="user-sub"  id="disp-sub">—</div>
        </div>
    </div>

    <form id="form" novalidate>

        <!-- วันที่ + การจองในวันนั้น -->
        <div class="section-card">
            <div class="section-title">เลือกวันที่</div>
            <div class="mb-2">
                <input type="date" class="form-control" id="booking_date" required>
            </div>
            <div id="booking-list-wrap" style="display:none;">
                <div style="font-size:12px;color:#aaa;margin:8px 0 4px;font-weight:600;">การจองในวันนี้</div>
                <div class="booking-list" id="booking-list"></div>
            </div>
        </div>

        <!-- Quick Booking -->
        <div class="section-card">
            <div class="section-title">จองด่วน</div>
            <div class="quick-btns">
                <div class="btn-quick" id="btn-morning" onclick="selectQuick('morning')">
                    <div class="q-label">🌅 จองเช้า</div>
                    <div class="q-time" id="morning-time">—</div>
                </div>
                <div class="btn-quick" id="btn-afternoon" onclick="selectQuick('afternoon')">
                    <div class="q-label">🌆 จองบ่าย</div>
                    <div class="q-time" id="afternoon-time">—</div>
                </div>
            </div>

            <div class="or-divider">หรือเลือกเวลาเอง (สูงสุด 3.5 ชั่วโมง)</div>

            <div class="row g-2">
                <div class="col-6">
                    <label class="field-label" for="start_time">เวลาเริ่ม <span class="text-danger">*</span></label>
                    <select class="form-select" id="start_time" onchange="onStartTimeChange()"></select>
                </div>
                <div class="col-6">
                    <label class="field-label" for="end_time">เวลาสิ้นสุด <span class="text-danger">*</span></label>
                    <select class="form-select" id="end_time"></select>
                </div>
            </div>
        </div>

        <!-- รายละเอียด -->
        <div class="section-card">
            <div class="section-title">รายละเอียดการจอง</div>
            <div class="mb-3">
                <label class="field-label" for="group_name">ชื่อกลุ่ม / กิจกรรม <span class="text-danger">*</span></label>
                <input type="text" class="form-control" id="group_name" placeholder="เช่น กลุ่มโปรเจกต์ CS" required>
            </div>
            <div>
                <label class="field-label" for="attendees">รายชื่อผู้เข้าใช้ <span class="text-danger">*</span></label>
                <textarea class="form-control" id="attendees" rows="4"
                    placeholder="พิมพ์รายชื่อผู้เข้าใช้ทุกคน&#10;เช่น นายสมชาย ใจดี&#10;นางสาวสมหญิง รักเรียน" required></textarea>
            </div>
        </div>

        <div id="form-error" class="alert alert-danger d-none" role="alert"></div>

        <button type="submit" class="btn-submit mb-4">ยืนยันการจอง</button>
    </form>
</div>

<script>
    const LIFF_ID       = "{{ liff_id }}";
    const ROOM_DATA     = {{ room_json|safe }};
    const REGISTER_URL  = "{{ register_url }}";
    const CHECK_URL     = "{% url 'check_user' %}";
    const BOOKING_URL   = "{% url 'create_booking' %}";
    const SUCCESS_URL   = "{% url 'booking_success' %}";
    const BY_DATE_URL   = "{% url 'bookings_by_date' %}";
    const HOLIDAYS      = new Set({{ holidays_json|safe }});
    const MAX_ADVANCE_DAYS = {{ max_advance_days }};
    const MAX_DURATION  = 210; // นาที = 3.5 ชม.

    let currentUserId = '';
    let quickSelected = null; // 'morning' | 'afternoon' | null

    // ── Slot คำนวณจาก room ───────────────────────────────────────────────────
    function timeToMin(t) {
        const [h, m] = t.split(':').map(Number);
        return h * 60 + m;
    }
    function minToTime(m) {
        return String(Math.floor(m / 60)).padStart(2,'0') + ':' + String(m % 60).padStart(2,'0');
    }

    let MORNING_START, MORNING_END, AFTERNOON_START, AFTERNOON_END;

    function initQuickSlots() {
        if (!ROOM_DATA) return;
        const open  = timeToMin(ROOM_DATA.open_time);
        const close = timeToMin(ROOM_DATA.close_time);
        MORNING_START   = open;
        MORNING_END     = open + MAX_DURATION;
        AFTERNOON_START = close - MAX_DURATION;
        AFTERNOON_END   = close;
        document.getElementById('morning-time').textContent =
            minToTime(MORNING_START) + '–' + minToTime(MORNING_END);
        document.getElementById('afternoon-time').textContent =
            minToTime(AFTERNOON_START) + '–' + minToTime(AFTERNOON_END);
    }

    // ── Error helpers ─────────────────────────────────────────────────────────
    function showFormError(msg) {
        const el = document.getElementById('form-error');
        el.textContent = msg;
        el.classList.remove('d-none');
        el.scrollIntoView({ behavior: 'smooth' });
    }
    function hideFormError() {
        document.getElementById('form-error').classList.add('d-none');
    }

    // ── Room banner ───────────────────────────────────────────────────────────
    function setupRoom() {
        if (!ROOM_DATA) {
            document.getElementById('room-banner').innerHTML =
                '<div style="font-size:16px;">ไม่พบข้อมูลห้อง กรุณาติดต่อเจ้าหน้าที่</div>';
            return false;
        }
        document.getElementById('room-name').textContent     = ROOM_DATA.name;
        document.getElementById('room-location').textContent = '📍 ' + ROOM_DATA.location;
        document.getElementById('room-hours').textContent    =
            '🕐 ' + ROOM_DATA.open_time + '–' + ROOM_DATA.close_time +
            '  |  👥 สูงสุด ' + ROOM_DATA.capacity + ' คน';
        return true;
    }

    // ── Time dropdown ─────────────────────────────────────────────────────────
    function buildStartOptions() {
        const sel = document.getElementById('start_time');
        let min = timeToMin(ROOM_DATA.open_time);
        const max = timeToMin(ROOM_DATA.close_time) - 30;
        sel.innerHTML = '<option value="">-- เลือกเวลาเริ่ม --</option>';
        while (min <= max) {
            const opt = document.createElement('option');
            opt.value = opt.textContent = minToTime(min);
            sel.appendChild(opt);
            min += 30;
        }
    }

    function buildEndOptions(startMin) {
        const sel = document.getElementById('end_time');
        const closeMin = timeToMin(ROOM_DATA.close_time);
        const maxEnd = Math.min(startMin + MAX_DURATION, closeMin);
        sel.innerHTML = '<option value="">-- เลือกเวลาสิ้นสุด --</option>';
        let min = startMin + 30;
        while (min <= maxEnd) {
            const opt = document.createElement('option');
            opt.value = opt.textContent = minToTime(min);
            sel.appendChild(opt);
            min += 30;
        }
    }

    function onStartTimeChange() {
        quickSelected = null;
        document.getElementById('btn-morning').classList.remove('active');
        document.getElementById('btn-afternoon').classList.remove('active');
        const val = document.getElementById('start_time').value;
        if (val) buildEndOptions(timeToMin(val));
        else document.getElementById('end_time').innerHTML = '<option value="">-- เลือกเวลาสิ้นสุด --</option>';
    }

    // ── Quick booking ─────────────────────────────────────────────────────────
    function selectQuick(type) {
        const btn = document.getElementById(type === 'morning' ? 'btn-morning' : 'btn-afternoon');
        if (btn.classList.contains('disabled')) return;

        quickSelected = type;
        document.getElementById('btn-morning').classList.toggle('active', type === 'morning');
        document.getElementById('btn-afternoon').classList.toggle('active', type === 'afternoon');

        const s = type === 'morning' ? MORNING_START : AFTERNOON_START;
        const e = type === 'morning' ? MORNING_END   : AFTERNOON_END;

        // set start_time dropdown
        const startSel = document.getElementById('start_time');
        startSel.value = minToTime(s);
        buildEndOptions(s);
        document.getElementById('end_time').value = minToTime(e);
        hideFormError();
    }

    // ── ตรวจ quick slot ว่าง/ไม่ว่างจาก booking list ──────────────────────────
    function updateQuickBtnState(bookings) {
        function overlaps(s, e, bs, be) {
            return s < be && e > bs;
        }
        [
            { id: 'btn-morning',   s: MORNING_START,   e: MORNING_END },
            { id: 'btn-afternoon', s: AFTERNOON_START, e: AFTERNOON_END },
        ].forEach(({ id, s, e }) => {
            const btn = document.getElementById(id);
            btn.classList.remove('disabled');
            // ลบ badge เดิม
            const old = btn.querySelector('.q-badge');
            if (old) old.remove();

            const conflict = bookings.some(b =>
                overlaps(s, e, timeToMin(b.start_time), timeToMin(b.end_time))
            );
            if (conflict) {
                btn.classList.add('disabled');
                // ถ้า active อยู่ให้ reset
                if (btn.classList.contains('active')) {
                    btn.classList.remove('active');
                    quickSelected = null;
                }
                const badge = document.createElement('div');
                badge.className = 'q-badge';
                badge.textContent = 'ไม่ว่าง';
                btn.appendChild(badge);
            }
        });
    }

    // ── Booking list ──────────────────────────────────────────────────────────
    async function loadBookingsByDate(dateStr) {
        if (!ROOM_DATA || !dateStr) return;
        const wrap = document.getElementById('booking-list-wrap');
        const list = document.getElementById('booking-list');
        list.innerHTML = '<div style="color:#bbb;font-size:13px;padding:6px 0;">กำลังโหลด...</div>';
        wrap.style.display = 'block';

        try {
            const resp = await fetch(BY_DATE_URL + '?room=' + ROOM_DATA.booking_name + '&date=' + dateStr);
            const data = await resp.json();
            const bookings = data.bookings || [];

            if (bookings.length === 0) {
                list.innerHTML = '<div class="no-booking">✅ ยังไม่มีการจองในวันนี้</div>';
            } else {
                list.innerHTML = bookings.map(b =>
                    `<div class="booking-item">
                        <span class="booking-time">${b.start_time}–${b.end_time}</span>
                        <div class="booking-right">
                            <div class="booking-group">${b.group_name}</div>
                            <div class="booking-booker">👤 ${b.booker}</div>
                        </div>
                    </div>`
                ).join('');
            }
            updateQuickBtnState(bookings);
        } catch {
            list.innerHTML = '<div style="color:#bbb;font-size:13px;">โหลดข้อมูลไม่ได้</div>';
        }
    }

    // ── Date helpers ──────────────────────────────────────────────────────────
    function toYMD(d) { return d.toISOString().split('T')[0]; }
    function calcMaxDate() {
        const d = new Date();
        d.setDate(d.getDate() + MAX_ADVANCE_DAYS);
        return d;
    }

    function setMinDate() {
        const today = new Date();
        const el = document.getElementById('booking_date');
        el.min   = toYMD(today);
        el.max   = toYMD(calcMaxDate());
        el.value = toYMD(today);
        loadBookingsByDate(el.value);
    }

    document.getElementById('booking_date').addEventListener('change', function() {
        const val = this.value;
        if (!val) return;
        if (HOLIDAYS.has(val)) {
            showFormError('วันที่เลือกเป็นวันหยุด กรุณาเลือกวันอื่น');
            this.value = '';
            document.getElementById('booking-list-wrap').style.display = 'none';
            return;
        }
        hideFormError();
        loadBookingsByDate(val);
    });

    // ── Show form ─────────────────────────────────────────────────────────────
    function showForm(userInfo) {
        const name    = userInfo.full_name || userInfo.displayName || '—';
        const faculty = userInfo.faculty   || '';
        const dept    = userInfo.department || '';
        const sub     = [faculty, dept].filter(Boolean).join(' · ');

        document.getElementById('disp-fullname').textContent = name;
        document.getElementById('disp-sub').textContent      = sub || '—';
        document.getElementById('user-avatar').textContent   = name.charAt(0) || '?';

        document.getElementById('loader').style.display      = 'none';
        document.getElementById('booking-form').style.display = 'block';
    }

    // ── Submit ────────────────────────────────────────────────────────────────
    document.getElementById('form').addEventListener('submit', async function(e) {
        e.preventDefault();
        hideFormError();

        const startVal = document.getElementById('start_time').value;
        const endVal   = document.getElementById('end_time').value;

        if (!startVal || !endVal) {
            showFormError('กรุณาเลือกเวลาเริ่มและเวลาสิ้นสุด');
            return;
        }

        const payload = {
            userId:       currentUserId,
            room:         ROOM_DATA ? ROOM_DATA.booking_name : '',
            booking_date: document.getElementById('booking_date').value,
            start_time:   startVal,
            end_time:     endVal,
            group_name:   document.getElementById('group_name').value.trim(),
            attendees:    document.getElementById('attendees').value.trim(),
        };

        const btn = document.querySelector('.btn-submit');
        btn.disabled    = true;
        btn.textContent = 'กำลังบันทึก...';

        try {
            const resp = await fetch(BOOKING_URL, {
                method:  'POST',
                headers: { 'Content-Type': 'application/json' },
                body:    JSON.stringify(payload),
            });
            const data = await resp.json();
            if (data.success) {
                window.location.href = SUCCESS_URL + '?id=' + data.booking_id;
            } else {
                showFormError(data.error || 'เกิดข้อผิดพลาด กรุณาลองใหม่');
                btn.disabled    = false;
                btn.textContent = 'ยืนยันการจอง';
            }
        } catch {
            showFormError('เชื่อมต่อเซิร์ฟเวอร์ไม่ได้ กรุณาลองใหม่');
            btn.disabled    = false;
            btn.textContent = 'ยืนยันการจอง';
        }
    });

    // ── Init ──────────────────────────────────────────────────────────────────
    setupRoom();
    initQuickSlots();
    if (ROOM_DATA) buildStartOptions();
    setMinDate();
</script>

<script src="https://static.line-scdn.net/liff/edge/versions/2.15.0/sdk.js"></script>
<script>
    const CACHE_KEY = 'npu_user_v1';

    async function checkUser(profile) {
        const cached = sessionStorage.getItem(CACHE_KEY);
        if (cached) {
            return JSON.parse(cached);
        }
        const resp = await fetch(CHECK_URL, {
            method:  'POST',
            headers: { 'Content-Type': 'application/json' },
            body:    JSON.stringify({ userId: profile.userId, displayName: profile.displayName }),
        });
        const data = await resp.json();
        if (data.registered) {
            sessionStorage.setItem(CACHE_KEY, JSON.stringify(data));
        }
        return data;
    }

    liff.init({ liffId: LIFF_ID })
        .then(async () => {
            if (!liff.isLoggedIn()) {
                liff.login({ redirectUri: window.location.href });
                return;
            }
            const profile = await liff.getProfile();
            currentUserId = profile.userId;
            const data = await checkUser(profile);

            if (!data.registered) {
                sessionStorage.removeItem(CACHE_KEY);
                window.location.href = REGISTER_URL
                    + '?userId='      + encodeURIComponent(profile.userId)
                    + '&displayName=' + encodeURIComponent(profile.displayName)
                    + '&pictureUrl='  + encodeURIComponent(profile.pictureUrl || '')
                    + '&page='        + encodeURIComponent(window.location.href);
                return;
            }
            showForm({ ...data, displayName: profile.displayName });
        })
        .catch(err => {
            const msg = err.message && err.message.includes('network')
                ? 'ไม่สามารถเชื่อมต่อได้<br>กรุณาตรวจสอบอินเทอร์เน็ตแล้วลองใหม่'
                : 'ไม่สามารถเชื่อมต่อ LINE ได้<br>กรุณาลองใหม่อีกครั้ง';
            document.getElementById('loader').innerHTML =
                `<div style="padding:32px 24px;text-align:center;">
                    <div style="font-size:40px;margin-bottom:12px;">⚠️</div>
                    <div style="font-size:15px;color:#333;font-weight:600;margin-bottom:6px;">${msg}</div>
                    <button onclick="location.reload()"
                        style="margin-top:16px;padding:9px 24px;border-radius:20px;
                               background:#06C755;color:#fff;border:none;font-size:14px;cursor:pointer;">
                        ลองใหม่
                    </button>
                 </div>`;
        });
</script>
</body>
</html>
