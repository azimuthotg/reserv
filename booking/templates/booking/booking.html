<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Library@NPU — จองพื้นที่บริการ</title>
    <style>
        html, body { margin: 0; width: 100%; height: 100%; }
        iframe { width: 100%; height: 100%; border: none; }
        #loader {
            position: fixed; inset: 0;
            display: flex; justify-content: center; align-items: center;
            background: rgba(255,255,255,0.9); z-index: 9999; flex-direction: column; gap: 12px;
        }
        .spinner {
            width: 40px; height: 40px; border: 4px solid #e0e0e0;
            border-top-color: #06C755; border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        #error-msg { display: none; padding: 20px; text-align: center; color: #c00; font-family: sans-serif; }
    </style>
</head>
<body>
    <div id="loader"><div class="spinner"></div></div>
    <div id="error-msg"></div>
    <iframe id="formframe" src=""></iframe>

    <script src="https://static.line-scdn.net/liff/edge/versions/2.15.0/sdk.js"></script>
    <script>
        const LIFF_ID      = "{{ liff_id }}";
        const GAS_URLS     = {{ gas_urls|safe }};
        const REGISTER_URL = "{{ register_url }}";
        const CHECK_URL    = "{% url 'check_user' %}";

        function showError(msg) {
            document.getElementById('loader').style.display = 'none';
            const el = document.getElementById('error-msg');
            el.textContent = msg;
            el.style.display = 'block';
        }

        function hideLoader() {
            document.getElementById('loader').style.display = 'none';
        }

        function loadGasForm(room, userId, displayName, pictureUrl, userLdap, user_type) {
            const base = GAS_URLS[room];
            if (!base) {
                showError('ไม่พบข้อมูลห้อง: ' + room);
                return;
            }
            const params = new URLSearchParams({ userId, displayName, pictureUrl, userLdap, user_type });
            document.getElementById('formframe').src = base + '?' + params.toString();
            setTimeout(hideLoader, 5000);
        }

        async function runApp(room) {
            let profile;
            try {
                profile = await liff.getProfile();
            } catch (e) {
                showError('ไม่สามารถดึงข้อมูล LINE ได้');
                return;
            }

            const { userId, displayName, pictureUrl } = profile;

            let data;
            try {
                const resp = await fetch(CHECK_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ userId }),
                });
                data = await resp.json();
            } catch (e) {
                showError('เชื่อมต่อเซิร์ฟเวอร์ไม่ได้ กรุณาลองใหม่');
                return;
            }

            if (!data.registered) {
                // ยังไม่ได้ลงทะเบียน → ส่งไปหน้า register เดิม
                const currentUrl = window.location.href;
                const registerRedirect = REGISTER_URL
                    + '?userId=' + encodeURIComponent(userId)
                    + '&displayName=' + encodeURIComponent(displayName)
                    + '&pictureUrl=' + encodeURIComponent(pictureUrl)
                    + '&page=' + encodeURIComponent(currentUrl);
                window.location.href = registerRedirect;
                return;
            }

            loadGasForm(room, userId, displayName, pictureUrl, data.userLdap, data.user_type);
        }

        function getRoom() {
            // LIFF 2.x encode params ไว้ใน liff.state เช่น ?liff.state=%3Fbooking_name%3Dnetflix
            let params = new URLSearchParams(window.location.search);
            const liffState = params.get('liff.state');
            if (liffState) {
                // decode แล้ว parse ใหม่
                params = new URLSearchParams(decodeURIComponent(liffState));
            }
            // รองรับทั้ง ?room= (ใหม่) และ ?booking_name= (เดิม)
            return params.get('room') || params.get('booking_name') || '';
        }

        liff.init({ liffId: LIFF_ID })
            .then(() => {
                const room = getRoom();

                if (liff.isLoggedIn()) {
                    runApp(room);
                } else {
                    liff.login({ redirectUri: window.location.href });
                }
            })
            .catch(err => showError('LIFF init error: ' + err.message));
    </script>
</body>
</html>
