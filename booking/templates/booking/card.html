<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>บัตรสมาชิกดิจิทัล — ห้องสมุด มนพ.</title>
  <script src="https://static.line-scdn.net/liff/edge/versions/2.15.0/sdk.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Sarabun', 'Segoe UI', sans-serif;
      background: linear-gradient(145deg, #0f3460 0%, #16213e 60%, #0a1628 100%);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    /* ── Loading / Error screens ── */
    #loading-screen, #error-screen {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      color: #fff;
      gap: 16px;
      text-align: center;
      padding: 24px;
    }
    .spinner {
      width: 44px; height: 44px;
      border: 4px solid rgba(255,255,255,0.2);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .loading-text { font-size: 15px; opacity: 0.8; }
    .error-icon { font-size: 48px; }
    .error-msg { font-size: 15px; opacity: 0.85; max-width: 280px; line-height: 1.6; }
    .btn-retry {
      background: rgba(255,255,255,0.15);
      color: #fff;
      border: 1px solid rgba(255,255,255,0.3);
      padding: 10px 28px;
      border-radius: 24px;
      font-size: 15px;
      cursor: pointer;
      backdrop-filter: blur(6px);
    }
    .btn-retry:hover { background: rgba(255,255,255,0.25); }

    /* ── Card ── */
    #card-screen { display: none; width: 100%; max-width: 360px; }

    .card-wrap {
      background: linear-gradient(135deg, #1a2a4a 0%, #0d1f3c 100%);
      border-radius: 20px;
      overflow: hidden;
      box-shadow: 0 20px 60px rgba(0,0,0,0.5), 0 0 0 1px rgba(255,255,255,0.06);
      position: relative;
    }

    /* decorative circles */
    .card-wrap::before {
      content: '';
      position: absolute;
      width: 260px; height: 260px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(100,180,255,0.06) 0%, transparent 70%);
      top: -80px; right: -60px;
      pointer-events: none;
    }
    .card-wrap::after {
      content: '';
      position: absolute;
      width: 180px; height: 180px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(80,220,150,0.05) 0%, transparent 70%);
      bottom: 40px; left: -40px;
      pointer-events: none;
    }

    /* header stripe */
    .card-header {
      background: linear-gradient(90deg, #229799 0%, #1a7a7c 100%);
      padding: 14px 20px;
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .card-header-logo {
      font-size: 20px;
    }
    .card-header-title {
      color: #fff;
      font-size: 13px;
      font-weight: 600;
      line-height: 1.3;
      letter-spacing: 0.3px;
    }
    .card-header-sub {
      color: rgba(255,255,255,0.8);
      font-size: 11px;
    }

    /* profile section */
    .card-profile {
      display: flex;
      align-items: center;
      gap: 14px;
      padding: 20px 20px 16px;
    }
    .profile-avatar {
      width: 72px; height: 72px;
      border-radius: 50%;
      border: 3px solid rgba(34,151,153,0.6);
      object-fit: cover;
      flex-shrink: 0;
      background: #2a3a5a;
    }
    .profile-avatar-placeholder {
      width: 72px; height: 72px;
      border-radius: 50%;
      border: 3px solid rgba(34,151,153,0.6);
      background: linear-gradient(135deg, #2a3a5a, #1a2a40);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 28px;
      flex-shrink: 0;
    }
    .profile-info { flex: 1; min-width: 0; }
    .profile-name {
      color: #fff;
      font-size: 17px;
      font-weight: 700;
      line-height: 1.3;
      word-break: break-word;
    }
    .profile-type {
      display: inline-block;
      margin-top: 5px;
      background: rgba(34,151,153,0.25);
      border: 1px solid rgba(34,151,153,0.5);
      color: #7ee8ea;
      font-size: 11px;
      padding: 2px 10px;
      border-radius: 12px;
      letter-spacing: 0.3px;
    }
    .profile-org {
      margin-top: 5px;
      color: rgba(200,220,255,0.7);
      font-size: 12px;
      line-height: 1.4;
    }

    /* divider */
    .card-divider {
      height: 1px;
      background: linear-gradient(90deg, transparent, rgba(255,255,255,0.1), transparent);
      margin: 0 20px;
    }

    /* walai status */
    .walai-status {
      padding: 14px 20px;
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .walai-badge {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 6px 14px;
      border-radius: 20px;
      font-size: 13px;
      font-weight: 600;
    }
    .walai-badge.member {
      background: rgba(34,197,94,0.15);
      border: 1px solid rgba(34,197,94,0.4);
      color: #4ade80;
    }
    .walai-badge.non-member {
      background: rgba(239,68,68,0.15);
      border: 1px solid rgba(239,68,68,0.4);
      color: #f87171;
    }
    .walai-dot {
      width: 8px; height: 8px;
      border-radius: 50%;
      animation: pulse-dot 2s infinite;
    }
    .member .walai-dot { background: #4ade80; }
    .non-member .walai-dot { background: #f87171; animation: none; }
    @keyframes pulse-dot {
      0%, 100% { opacity: 1; transform: scale(1); }
      50% { opacity: 0.5; transform: scale(0.7); }
    }
    .walai-detail {
      color: rgba(200,220,255,0.55);
      font-size: 11px;
    }

    /* QR section */
    .card-qr {
      padding: 16px 20px 24px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 10px;
    }
    .qr-label {
      color: rgba(200,220,255,0.5);
      font-size: 11px;
      letter-spacing: 0.8px;
      text-transform: uppercase;
    }
    .qr-box {
      background: #fff;
      border-radius: 14px;
      padding: 14px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 4px 20px rgba(0,0,0,0.3);
    }
    #qr-canvas canvas, #qr-canvas img { display: block; }
    .qr-barcode-num {
      color: rgba(200,220,255,0.45);
      font-size: 11px;
      letter-spacing: 1.5px;
      font-family: monospace;
    }
    .no-qr-text {
      color: rgba(200,220,255,0.5);
      font-size: 13px;
      text-align: center;
      padding: 8px 0;
    }

    /* footer */
    .card-footer {
      padding: 0 20px 20px;
      text-align: center;
    }
    .card-footer-text {
      color: rgba(200,220,255,0.3);
      font-size: 10px;
      letter-spacing: 0.5px;
    }

    /* back button */
    .btn-back {
      display: block;
      margin-top: 16px;
      text-align: center;
      color: rgba(255,255,255,0.5);
      font-size: 13px;
      text-decoration: none;
      padding: 8px;
    }
    .btn-back:hover { color: rgba(255,255,255,0.8); }
  </style>
</head>
<body>

<!-- Loading -->
<div id="loading-screen">
  <div class="spinner"></div>
  <div class="loading-text">กำลังโหลดบัตรสมาชิก...</div>
</div>

<!-- Error -->
<div id="error-screen" style="display:none;">
  <div class="error-icon">⚠️</div>
  <div class="error-msg" id="error-msg-text">เกิดข้อผิดพลาด กรุณาลองใหม่อีกครั้ง</div>
  <button class="btn-retry" onclick="location.reload()">ลองใหม่</button>
</div>

<!-- Card -->
<div id="card-screen">
  <div class="card-wrap">
    <!-- Header -->
    <div class="card-header">
      <div class="card-header-logo">🏛️</div>
      <div>
        <div class="card-header-title">บัตรสมาชิกดิจิทัล</div>
        <div class="card-header-sub">สำนักวิทยบริการ มหาวิทยาลัยนครพนม</div>
      </div>
    </div>

    <!-- Profile -->
    <div class="card-profile">
      <div id="avatar-wrap">
        <div class="profile-avatar-placeholder">👤</div>
      </div>
      <div class="profile-info">
        <div class="profile-name" id="card-name">—</div>
        <span class="profile-type" id="card-type">—</span>
        <div class="profile-org" id="card-org"></div>
      </div>
    </div>

    <div class="card-divider"></div>

    <!-- Walai status -->
    <div class="walai-status">
      <div class="walai-badge" id="walai-badge">
        <div class="walai-dot"></div>
        <span id="walai-badge-text">กำลังตรวจสอบ...</span>
      </div>
    </div>

    <div class="card-divider"></div>

    <!-- QR Code -->
    <div class="card-qr">
      <div class="qr-label">รหัสเข้าใช้บริการ</div>
      <div id="qr-area">
        <div class="qr-box">
          <div id="qr-canvas"></div>
        </div>
      </div>
      <div class="qr-barcode-num" id="barcode-num"></div>
    </div>

    <!-- Footer -->
    <div class="card-footer">
      <div class="card-footer-text">ใช้ QR Code นี้สแกนเพื่อเข้าใช้บริการ</div>
    </div>
  </div>

  <a href="{{ register_url }}" class="btn-back" id="btn-back" style="display:none;">← ลงทะเบียน</a>
</div>

<script>
  const LIFF_ID     = '{{ liff_id }}';
  const CHECK_URL   = '{{ check_url }}';
  const WALAI_URL   = '{{ walai_url }}';
  const REGISTER_URL = '{{ register_url }}';
  const CACHE_KEY   = 'npu_user_v1';

  function showError(msg) {
    document.getElementById('loading-screen').style.display = 'none';
    document.getElementById('error-msg-text').textContent = msg;
    document.getElementById('error-screen').style.display = 'flex';
  }

  function showCard() {
    document.getElementById('loading-screen').style.display = 'none';
    document.getElementById('card-screen').style.display = 'block';
  }

  async function checkUser(profile) {
    const cached = sessionStorage.getItem(CACHE_KEY);
    if (cached) return JSON.parse(cached);
    const resp = await fetch(CHECK_URL, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ userId: profile.userId, displayName: profile.displayName }),
    });
    const data = await resp.json();
    if (data.registered) sessionStorage.setItem(CACHE_KEY, JSON.stringify(data));
    return data;
  }

  function setAvatar(pictureUrl) {
    if (!pictureUrl) return;
    const wrap = document.getElementById('avatar-wrap');
    const img = document.createElement('img');
    img.src = pictureUrl;
    img.className = 'profile-avatar';
    img.alt = 'profile';
    img.onerror = () => {}; // keep placeholder on error
    wrap.innerHTML = '';
    wrap.appendChild(img);
  }

  function renderQR(barcode) {
    const canvas = document.getElementById('qr-canvas');
    canvas.innerHTML = '';
    new QRCode(canvas, {
      text: barcode,
      width: 180,
      height: 180,
      colorDark: '#0d1f3c',
      colorLight: '#ffffff',
      correctLevel: QRCode.CorrectLevel.M,
    });
    document.getElementById('barcode-num').textContent = barcode;
  }

  function setWalaiBadge(isMember) {
    const badge = document.getElementById('walai-badge');
    const text  = document.getElementById('walai-badge-text');
    if (isMember) {
      badge.className = 'walai-badge member';
      text.textContent = '✓ สมาชิกห้องสมุด';
    } else {
      badge.className = 'walai-badge non-member';
      text.textContent = '✗ ไม่ใช่สมาชิก';
    }
  }

  async function init() {
    try {
      await liff.init({ liffId: LIFF_ID });

      if (!liff.isLoggedIn()) {
        liff.login({ redirectUri: location.href });
        return;
      }

      const profile = await liff.getProfile();
      setAvatar(profile.pictureUrl);

      // check registration
      const userData = await checkUser(profile);

      if (!userData.registered) {
        // redirect to register, come back here after
        const cardUrl = location.href.split('?')[0];
        location.href = REGISTER_URL + '?userId=' + encodeURIComponent(profile.userId)
          + '&displayName=' + encodeURIComponent(profile.displayName)
          + '&pictureUrl=' + encodeURIComponent(profile.pictureUrl || '')
          + '&page=' + encodeURIComponent(cardUrl);
        return;
      }

      // fill profile info
      const fullName = userData.full_name || profile.displayName;
      const userType = userData.user_type || '';
      const isStudent = userType === 'นักศึกษา';

      document.getElementById('card-name').textContent = fullName;
      document.getElementById('card-type').textContent = userType;

      const orgEl = document.getElementById('card-org');
      if (isStudent && userData.faculty) {
        orgEl.textContent = userData.faculty;
      } else if (!isStudent && userData.department) {
        orgEl.textContent = userData.department;
      } else if (userData.faculty) {
        orgEl.textContent = userData.faculty;
      }

      showCard();

      // fetch Walai status
      try {
        const wResp = await fetch(WALAI_URL, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ userId: profile.userId, userLdap: userData.userLdap }),
        });
        const wData = await wResp.json();

        if (wData.is_member && wData.barcode) {
          setWalaiBadge(true);
          renderQR(wData.barcode);
        } else {
          setWalaiBadge(false);
          document.getElementById('qr-area').innerHTML =
            '<div class="no-qr-text">ไม่พบข้อมูลสมาชิกในระบบ Walai<br><small style="opacity:.6">ติดต่อเจ้าหน้าที่เพื่อสมัครสมาชิก</small></div>';
        }
      } catch (e) {
        setWalaiBadge(false);
        document.getElementById('qr-area').innerHTML =
          '<div class="no-qr-text">ไม่สามารถตรวจสอบ Walai ได้ในขณะนี้</div>';
      }

    } catch (err) {
      showError('ไม่สามารถเชื่อมต่อ LINE ได้\nกรุณาเปิดจาก LINE OA อีกครั้ง');
    }
  }

  init();
</script>
</body>
</html>
