{% load static %}
<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>จองพื้นที่บริการ — Library@NPU</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <style>
        * { box-sizing: border-box; }
        body { background: #f0f2f5; font-family: 'Sarabun', sans-serif; margin: 0; }

        /* ── Loader ── */
        #loader {
            position: fixed; inset: 0; display: flex; flex-direction: column;
            justify-content: center; align-items: center;
            background: #fff; z-index: 9999; gap: 14px;
        }
        .spinner {
            width: 44px; height: 44px; border: 4px solid #e8e8e8;
            border-top-color: #06C755; border-radius: 50%;
            animation: spin .8s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        #content { display: none; }

        /* ── Header ── */
        .app-header {
            background: linear-gradient(135deg, #06C755 0%, #00a844 100%);
            padding: 16px 20px 14px;
            position: sticky; top: 0; z-index: 100;
            box-shadow: 0 2px 8px rgba(6,199,85,.3);
        }
        .header-top {
            display: flex; align-items: center; justify-content: space-between;
        }
        .header-brand { color: #fff; }
        .header-brand .org  { font-size: 11px; opacity: .8; margin-bottom: 2px; }
        .header-brand .name { font-size: 18px; font-weight: 700; line-height: 1; }
        .btn-calendar {
            background: rgba(255,255,255,.2); color: #fff;
            border: 1.5px solid rgba(255,255,255,.4); border-radius: 20px;
            padding: 5px 12px; font-size: 12px; font-weight: 600;
            text-decoration: none; display: flex; align-items: center; gap: 5px;
            transition: background .15s;
        }
        .btn-calendar:hover { background: rgba(255,255,255,.3); color: #fff; }

        /* ── User chip ── */
        .user-chip {
            display: flex; align-items: center; gap: 8px;
            background: rgba(255,255,255,.15); border-radius: 24px;
            padding: 6px 10px 6px 6px; margin-top: 10px;
            width: fit-content;
        }
        .user-chip .pic {
            width: 28px; height: 28px; border-radius: 50%;
            background: rgba(255,255,255,.3); overflow: hidden;
            display: flex; align-items: center; justify-content: center;
            font-size: 12px; font-weight: 700; color: #fff; flex-shrink: 0;
        }
        .user-chip .pic img { width: 100%; height: 100%; object-fit: cover; }
        .user-chip .info { line-height: 1.2; }
        .user-chip .uname { font-size: 13px; font-weight: 600; color: #fff; }
        .user-chip .ufac  { font-size: 11px; color: rgba(255,255,255,.75); }

        /* ── Body ── */
        .body-wrap { max-width: 560px; margin: 0 auto; padding: 16px; }

        .section-hd {
            font-size: 11px; font-weight: 700; color: #aaa;
            text-transform: uppercase; letter-spacing: .8px;
            margin-bottom: 10px;
        }

        /* ── Room card ── */
        .room-card {
            background: #fff; border-radius: 14px;
            box-shadow: 0 1px 4px rgba(0,0,0,.07);
            margin-bottom: 10px; overflow: hidden;
            display: flex; flex-direction: column;
        }
        .room-img {
            width: 100%; height: 150px; overflow: hidden;
            background: #f0f2f5; position: relative;
        }
        .room-img img {
            width: 100%; height: 100%; object-fit: cover;
            display: block;
        }
        .room-img-placeholder {
            width: 100%; height: 100%;
            display: flex; align-items: center; justify-content: center;
            font-size: 40px; opacity: .35;
        }
        .room-accent-bar { height: 4px; flex-shrink: 0; }
        .room-body { padding: 12px 14px 14px; flex: 1; min-width: 0; }
        .room-top { display: flex; align-items: flex-start; justify-content: space-between; gap: 8px; }
        .room-name { font-size: 15px; font-weight: 700; color: #1a1a1a; line-height: 1.2; }
        .room-capacity {
            font-size: 11px; font-weight: 600; color: #777;
            background: #f3f4f6; border-radius: 20px; padding: 3px 9px;
            white-space: nowrap; flex-shrink: 0;
        }
        .room-location { font-size: 12px; color: #999; margin-top: 3px; }
        .room-footer {
            display: flex; align-items: center; justify-content: space-between;
            margin-top: 10px; gap: 10px;
        }
        .room-hours {
            font-size: 12px; color: #059944; font-weight: 600;
            display: flex; align-items: center; gap: 4px;
        }
        .btn-book {
            padding: 7px 18px; border-radius: 20px;
            background: #06C755; color: #fff; border: none;
            font-size: 13px; font-weight: 600; cursor: pointer;
            text-decoration: none; white-space: nowrap;
            transition: background .15s;
        }
        .btn-book:hover { background: #059944; color: #fff; }
        .btn-detail {
            padding: 7px 14px; border-radius: 20px;
            background: transparent; border: 1.5px solid currentColor;
            font-size: 13px; font-weight: 600; cursor: pointer;
            text-decoration: none; white-space: nowrap;
            transition: background .15s;
        }
        .btn-detail:hover { background: rgba(0,0,0,.06); }

        /* ── My booking card ── */
        .my-booking-card {
            background: #fff; border-radius: 12px;
            box-shadow: 0 1px 4px rgba(0,0,0,.07);
            margin-bottom: 8px; overflow: hidden;
            display: flex; align-items: stretch;
        }
        .my-booking-accent { width: 4px; flex-shrink: 0; }
        .my-booking-body {
            padding: 11px 13px; flex: 1;
            display: flex; align-items: center; justify-content: space-between; gap: 8px;
        }
        .my-booking-main .mbk-room  { font-size: 13px; font-weight: 700; color: #1a1a1a; }
        .my-booking-main .mbk-group { font-size: 12px; color: #888; margin-top: 1px; }
        .my-booking-right { text-align: right; flex-shrink: 0; }
        .my-booking-right .mbk-date { font-size: 12px; font-weight: 600; color: #555; }
        .my-booking-right .mbk-time { font-size: 11px; color: #aaa; margin-top: 2px; }
        .my-booking-card.cancelled  { opacity: .5; }
        .my-booking-card.cancelled .mbk-room { text-decoration: line-through; }
        .badge-cancelled-bk {
            display: inline-block; font-size: 10px; font-weight: 700;
            background: #fee2e2; color: #dc2626; border-radius: 4px;
            padding: 1px 6px; margin-top: 4px;
        }
        .btn-cancel-bk {
            font-size: 11px; color: #dc2626; background: transparent;
            border: 1.5px solid #dc2626; border-radius: 20px;
            padding: 4px 10px; margin-top: 4px; cursor: pointer;
            font-weight: 600; white-space: nowrap; transition: background .15s;
            text-decoration: none; display: inline-block;
        }
        .btn-cancel-bk:hover { background: rgba(220,38,38,.08); }
        .no-booking {
            background: #fff; border-radius: 12px; padding: 14px 16px;
            text-align: center; font-size: 13px; color: #bbb; margin-bottom: 10px;
        }
        /* Toast */
        #toast {
            position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%);
            background: #1a1a1a; color: #fff; border-radius: 20px;
            padding: 10px 20px; font-size: 13px; z-index: 9999;
            opacity: 0; transition: opacity .3s; pointer-events: none; white-space: nowrap;
        }
        #toast.show { opacity: 1; }

        /* ── Calendar card ── */
        .calendar-banner {
            background: #fff; border-radius: 14px;
            box-shadow: 0 1px 4px rgba(0,0,0,.07);
            padding: 14px 16px;
            display: flex; align-items: center; justify-content: space-between;
            margin-bottom: 16px; gap: 10px;
        }
        .calendar-banner .cal-info .cal-title { font-size: 14px; font-weight: 700; color: #222; }
        .calendar-banner .cal-info .cal-sub   { font-size: 12px; color: #888; margin-top: 2px; }
        .btn-cal-go {
            padding: 7px 16px; border-radius: 20px;
            background: #f0f2f5; color: #333; border: none;
            font-size: 13px; font-weight: 600; text-decoration: none;
            white-space: nowrap; flex-shrink: 0; transition: background .15s;
        }
        .btn-cal-go:hover { background: #e0e2e6; color: #222; }
    </style>
</head>
<body>

<div id="toast"></div>
<div id="loader">
    <div class="spinner"></div>
    <div style="font-size:13px;color:#aaa;">กำลังตรวจสอบสิทธิ์…</div>
</div>

<div id="content">
    <!-- Header -->
    <div class="app-header">
        <div class="header-top">
            <div class="header-brand">
                <div class="org">สำนักวิทยบริการ มนพ.</div>
                <div class="name">จองพื้นที่บริการ</div>
            </div>
            <a href="calendar/" class="btn-calendar">
                📅 ปฏิทิน
            </a>
        </div>
        <div class="user-chip" id="user-chip" style="display:none;">
            <div class="pic" id="user-pic"><span id="user-initial">?</span></div>
            <div class="info">
                <div class="uname" id="user-name"></div>
                <div class="ufac"  id="user-fac"></div>
            </div>
        </div>
    </div>

    <!-- Body -->
    <div class="body-wrap">
        <!-- Calendar shortcut -->
        <div class="calendar-banner">
            <div class="cal-info">
                <div class="cal-title">📅 ปฏิทินการจองรวม</div>
                <div class="cal-sub">ดูตารางการจองทุกห้องในมุมมองปฏิทิน</div>
            </div>
            <a href="calendar/" class="btn-cal-go">ดูปฏิทิน →</a>
        </div>

        <!-- My Bookings -->
        <div id="my-bookings-section" style="display:none;">
            <div class="section-hd">การจองของฉัน</div>
            <div id="my-bookings-list"></div>
        </div>

        <div class="section-hd">ห้องที่เปิดให้บริการ</div>
        <div id="room-list"></div>
    </div>
</div>

<script src="https://static.line-scdn.net/liff/edge/versions/2.15.0/sdk.js"></script>
<script>
    const LIFF_ID          = "{{ liff_id }}";
    const CHECK_URL        = "{{ check_url }}";
    const IMAGE_BASE       = "{% static 'booking/images/rooms/' %}";
    const REGISTER_URL     = "{{ register_url }}";
    const MY_BOOKING_URL   = "{{ my_bookings_url }}";
    const CANCEL_URL       = "{{ cancel_booking_url }}";
    const ROOM_DETAIL_BASE = "room/";
    const ROOMS            = {{ rooms_json|safe }};
    let currentUserId    = null;

    const ACCENT_COLORS = ['#06C755','#3b82f6','#f59e0b','#8b5cf6','#ef4444','#06b6d4'];

    function renderRooms() {
        const list = document.getElementById('room-list');
        if (!ROOMS.length) {
            list.innerHTML = '<p style="text-align:center;color:#aaa;font-size:14px;padding:32px 0;">ยังไม่มีห้องเปิดให้บริการ</p>';
            return;
        }
        list.innerHTML = ROOMS.map((r, i) => {
            const color = ACCENT_COLORS[i % ACCENT_COLORS.length];
            const imgSrc = IMAGE_BASE + r.booking_name + '.png';
            return `
            <div class="room-card">
                <div class="room-img">
                    <img src="${imgSrc}" alt="${r.name}"
                         onerror="this.style.display='none';this.nextElementSibling.style.display='flex';">
                    <div class="room-img-placeholder" style="display:none;background:${color}18;">🏢</div>
                </div>
                <div class="room-accent-bar" style="background:${color};"></div>
                <div class="room-body">
                    <div class="room-top">
                        <div class="room-name">${r.name}</div>
                        <span class="room-capacity">👥 ${r.capacity} คน</span>
                    </div>
                    ${r.location ? `<div class="room-location">📍 ${r.location}</div>` : ''}
                    <div class="room-footer">
                        <div class="room-hours">🕐 ${r.open_time} – ${r.close_time} น.</div>
                        <div style="display:flex;gap:6px;">
                            <a class="btn-detail" href="${ROOM_DETAIL_BASE}${r.booking_name}/"
                               style="color:${color};">
                                รายละเอียด
                            </a>
                            <a class="btn-book" href="booking/?room=${r.booking_name}" style="background:${color};">
                                จองห้องนี้
                            </a>
                        </div>
                    </div>
                </div>
            </div>`;
        }).join('');
    }

    const TH_MONTHS = ['','ม.ค.','ก.พ.','มี.ค.','เม.ย.','พ.ค.','มิ.ย.',
                        'ก.ค.','ส.ค.','ก.ย.','ต.ค.','พ.ย.','ธ.ค.'];

    function showToast(msg, isError = false) {
        const t = document.getElementById('toast');
        t.textContent = msg;
        t.style.background = isError ? '#dc2626' : '#1a1a1a';
        t.classList.add('show');
        setTimeout(() => t.classList.remove('show'), 3000);
    }

    function renderMyBookings(bookings) {
        const section = document.getElementById('my-bookings-section');
        const list    = document.getElementById('my-bookings-list');
        section.style.display = 'block';

        if (!bookings.length) {
            list.innerHTML = '<div class="no-booking">ยังไม่มีการจองที่กำลังจะมาถึง</div>';
            return;
        }

        list.innerHTML = bookings.map(b => {
            const idx      = ROOMS.findIndex(r => r.booking_name === b.room_key);
            const color    = ACCENT_COLORS[idx >= 0 ? idx % ACCENT_COLORS.length : 0];
            const d        = b.booking_date.split('-');
            const dateStr  = `${parseInt(d[2])} ${TH_MONTHS[parseInt(d[1])]} ${parseInt(d[0])+543}`;
            const isCancelled = b.status === 'cancelled';
            const accentColor = isCancelled ? '#ddd' : color;
            const extraClass  = isCancelled ? 'cancelled' : '';
            const actionHtml  = isCancelled
                ? `<span class="badge-cancelled-bk">ยกเลิกแล้ว</span>`
                : `<button class="btn-cancel-bk"
                       onclick="cancelBooking(${b.id},'${b.room_name}','${dateStr}')">
                       ยกเลิกการจอง
                   </button>`;
            return `
            <div class="my-booking-card ${extraClass}" id="bk-${b.id}">
                <div class="my-booking-accent" style="background:${accentColor};"></div>
                <div class="my-booking-body">
                    <div class="my-booking-main">
                        <div class="mbk-room">${b.room_name}</div>
                        <div class="mbk-group">${b.group_name}</div>
                        ${actionHtml}
                    </div>
                    <div class="my-booking-right">
                        <div class="mbk-date">${dateStr}</div>
                        <div class="mbk-time">${b.start_time} – ${b.end_time}</div>
                    </div>
                </div>
            </div>`;
        }).join('');
    }

    async function loadMyBookings(userId) {
        try {
            const resp = await fetch(MY_BOOKING_URL + '?userId=' + encodeURIComponent(userId));
            const data = await resp.json();
            renderMyBookings(data.bookings || []);
        } catch(e) { /* ไม่แสดง error ถ้าโหลดไม่ได้ */ }
    }

    async function cancelBooking(bookingId, roomName, dateStr) {
        if (!confirm(`ยืนยันยกเลิกการจอง?\n${roomName} — ${dateStr}`)) return;
        try {
            const resp = await fetch(CANCEL_URL, {
                method:  'POST',
                headers: { 'Content-Type': 'application/json' },
                body:    JSON.stringify({ userId: currentUserId, bookingId: bookingId }),
            });
            const data = await resp.json();
            if (data.success) {
                // อัปเดต card เป็น cancelled แทนการลบ
                const card = document.getElementById('bk-' + bookingId);
                if (card) {
                    card.classList.add('cancelled');
                    card.querySelector('.my-booking-accent').style.background = '#ddd';
                    card.querySelector('.mbk-room').style.textDecoration = 'line-through';
                    const btn = card.querySelector('.btn-cancel-bk');
                    if (btn) {
                        btn.outerHTML = '<span class="badge-cancelled-bk">ยกเลิกแล้ว</span>';
                    }
                }
                showToast('ยกเลิกการจองเรียบร้อยแล้ว');
            } else {
                showToast(data.error || 'เกิดข้อผิดพลาด', true);
            }
        } catch(e) {
            showToast('ไม่สามารถเชื่อมต่อได้ กรุณาลองใหม่', true);
        }
    }

    function showContent(userData, profile) {
        const chip = document.getElementById('user-chip');
        if (userData.full_name) {
            document.getElementById('user-name').textContent = userData.full_name;
            document.getElementById('user-fac').textContent  = userData.faculty || userData.user_type || '';
            if (profile && profile.pictureUrl) {
                document.getElementById('user-pic').innerHTML = `<img src="${profile.pictureUrl}" alt="">`;
            } else {
                document.getElementById('user-initial').textContent = (userData.full_name || '?')[0];
            }
            chip.style.display = 'flex';
        }
        renderRooms();
        document.getElementById('loader').style.display  = 'none';
        document.getElementById('content').style.display = 'block';
    }

    const CACHE_KEY = 'npu_user_v1';

    async function checkUser(profile) {
        const cached = sessionStorage.getItem(CACHE_KEY);
        if (cached) {
            return JSON.parse(cached);
        }
        const resp = await fetch(CHECK_URL, {
            method:  'POST',
            headers: { 'Content-Type': 'application/json' },
            body:    JSON.stringify({ userId: profile.userId, displayName: profile.displayName }),
        });
        const data = await resp.json();
        if (data.registered) {
            sessionStorage.setItem(CACHE_KEY, JSON.stringify(data));
        }
        return data;
    }

    liff.init({ liffId: LIFF_ID })
        .then(async () => {
            if (!liff.isLoggedIn()) {
                liff.login({ redirectUri: window.location.href });
                return;
            }
            const profile = await liff.getProfile();
            currentUserId = profile.userId;
            const data = await checkUser(profile);
            if (!data.registered) {
                sessionStorage.removeItem(CACHE_KEY);
                window.location.href = REGISTER_URL
                    + '?userId='      + encodeURIComponent(profile.userId)
                    + '&displayName=' + encodeURIComponent(profile.displayName)
                    + '&pictureUrl='  + encodeURIComponent(profile.pictureUrl || '')
                    + '&page='        + encodeURIComponent(window.location.href);
                return;
            }
            showContent(data, profile);
            loadMyBookings(profile.userId);
        })
        .catch(err => {
            const msg = err.message && err.message.includes('network')
                ? 'ไม่สามารถเชื่อมต่อได้<br>กรุณาตรวจสอบอินเทอร์เน็ตแล้วลองใหม่'
                : 'ไม่สามารถเชื่อมต่อ LINE ได้<br>กรุณาลองใหม่อีกครั้ง';
            document.getElementById('loader').innerHTML =
                `<div style="padding:32px 24px;text-align:center;">
                    <div style="font-size:40px;margin-bottom:12px;">⚠️</div>
                    <div style="font-size:15px;color:#333;font-weight:600;margin-bottom:6px;">${msg}</div>
                    <button onclick="location.reload()"
                        style="margin-top:16px;padding:9px 24px;border-radius:20px;
                               background:#06C755;color:#fff;border:none;font-size:14px;cursor:pointer;">
                        ลองใหม่
                    </button>
                 </div>`;
        });
</script>
</body>
</html>
