<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>เข้าสู่ระบบ — Library@NPU</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <style>
        body { background: #1a1f2e; min-height: 100vh; display: flex; align-items: center; justify-content: center; font-family: 'Sarabun', sans-serif; }
        .login-card { background: #fff; border-radius: 16px; padding: 40px; width: 100%; max-width: 380px; box-shadow: 0 8px 32px rgba(0,0,0,.3); }
        .login-logo { width: 52px; height: 52px; background: #06C755; border-radius: 14px; display: flex; align-items: center; justify-content: center; font-size: 26px; color: #fff; font-weight: 700; margin: 0 auto 16px; }
        .login-title { font-size: 20px; font-weight: 700; color: #222; text-align: center; }
        .login-sub { font-size: 13px; color: #888; text-align: center; margin-bottom: 28px; }
        .btn-login { background: #06C755; color: #fff; border: none; border-radius: 10px; padding: 12px; font-size: 15px; font-weight: 600; width: 100%; }
        .btn-login:hover { background: #059944; color: #fff; }
        label { font-size: 13px; color: #555; font-weight: 600; margin-bottom: 4px; }
    </style>
</head>
<body>
<div class="login-card">
    <div class="login-logo">L</div>
    <div class="login-title">Staff Portal</div>
    <div class="login-sub">สำนักวิทยบริการ มหาวิทยาลัยนครพนม</div>

    {% if error %}
    <div class="alert alert-danger" style="font-size:13px;">{{ error }}</div>
    {% endif %}

    <form method="post">
        {% csrf_token %}
        <div class="mb-3">
            <label>ชื่อผู้ใช้</label>
            <input type="text" name="username" class="form-control" autofocus required>
        </div>
        <div class="mb-4">
            <label>รหัสผ่าน</label>
            <input type="password" name="password" class="form-control" required>
        </div>
        <button type="submit" class="btn-login">เข้าสู่ระบบ</button>
    </form>
</div>
</body>
</html>
