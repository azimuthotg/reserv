<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ระบบจองพื้นที่บริการ</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
  <style>
    body { background:#f5f7fa; font-family:'Sarabun',sans-serif; }
    .center-box { min-height:100vh; display:flex; align-items:center; justify-content:center; }
  </style>
</head>
<body>

<div class="center-box">
  <div class="col-11 col-sm-8 col-md-5 col-lg-4">

    <!-- Spinner (แสดงขณะ init LIFF) -->
    <div id="loading" class="text-center py-5">
      <div class="spinner-border text-success mb-3" style="width:3rem;height:3rem;"></div>
      <p class="text-muted">กำลังตรวจสอบข้อมูล LINE...</p>
    </div>

    <!-- Error / Fallback (browser ที่ไม่มี LINE context) -->
    <div id="fallback" class="card p-4 d-none">
      <div class="text-center mb-3">
        <i class="bi bi-person-circle" style="font-size:2.5rem;color:#006633;"></i>
        <h6 class="mt-2 fw-bold">เข้าสู่ระบบด้วยบัญชี NPU</h6>
        <small class="text-muted">สำหรับการเข้าใช้งานผ่าน Browser</small>
      </div>

      <div id="errorMsg" class="alert alert-warning d-none">
        <i class="bi bi-exclamation-triangle me-1"></i>
        <span id="errorText"></span>
      </div>

      <form id="loginForm">
        <div class="mb-3">
          <label class="form-label fw-semibold">Username</label>
          <input type="text" id="username" class="form-control" placeholder="รหัสนักศึกษา / username AD" required autocomplete="username">
        </div>
        <div class="mb-3">
          <label class="form-label fw-semibold">Password</label>
          <div class="input-group">
            <input type="password" id="password" class="form-control" required autocomplete="current-password">
            <button class="btn btn-outline-secondary" type="button" id="togglePass">
              <i class="bi bi-eye" id="eyeIcon"></i>
            </button>
          </div>
        </div>
        <div class="mb-3">
          <label class="form-label fw-semibold">ประเภทผู้ใช้</label>
          <select id="userType" class="form-select" required>
            <option value="" disabled selected>— เลือกประเภท —</option>
            <option value="นักศึกษา">นักศึกษา</option>
            <option value="บุคลากรภายในมหาวิทยาลัย">บุคลากรภายในมหาวิทยาลัย</option>
          </select>
        </div>
        <div class="d-grid">
          <button type="submit" class="btn btn-primary btn-lg" id="loginBtn">
            <span id="loginText"><i class="bi bi-box-arrow-in-right me-1"></i> เข้าสู่ระบบ</span>
            <span id="loginLoading" class="d-none">
              <span class="spinner-border spinner-border-sm me-1"></span> กำลังตรวจสอบ...
            </span>
          </button>
        </div>
      </form>
    </div>

    <!-- Error ร้ายแรง -->
    <div id="fatalError" class="alert alert-danger d-none text-center">
      <i class="bi bi-exclamation-triangle-fill me-1"></i>
      <span id="fatalText"></span>
    </div>

  </div>
</div>

<script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
<script>
const LIFF_ID = "{{ liff_id }}";

// ─── ดึง room จาก URL params ─────────────────────────────────────────────────
function getRoomFromUrl() {
  const params = new URLSearchParams(window.location.search);
  let room = params.get('room');
  if (!room) {
    // LIFF อาจ encode ไว้ใน liff.state
    const state = params.get('liff.state');
    if (state) {
      const sp = new URLSearchParams(decodeURIComponent(state).replace(/^\?/, ''));
      room = sp.get('room');
    }
  }
  return room || '';
}

// ─── Redirect ไปหน้าจอง ──────────────────────────────────────────────────────
function goToBooking(room, lineId) {
  let url = '{% url "booking" %}?room=' + encodeURIComponent(room);
  if (lineId) url += '&line_id=' + encodeURIComponent(lineId);
  window.location.replace(url);
}

// ─── แสดง fallback form ───────────────────────────────────────────────────────
function showFallback(msg) {
  document.getElementById('loading').classList.add('d-none');
  document.getElementById('fallback').classList.remove('d-none');
  if (msg) {
    document.getElementById('errorText').textContent = msg;
    document.getElementById('errorMsg').classList.remove('d-none');
  }
}

// ─── LIFF Init ────────────────────────────────────────────────────────────────
async function initLiff() {
  try {
    await liff.init({ liffId: LIFF_ID, withLoginOnExternalBrowser: true });

    const room = getRoomFromUrl();
    const ctx = liff.getContext();
    const userId = ctx?.userId;

    if (userId) {
      // ✅ ได้ userId จาก LINE context → ไปจองได้เลย
      goToBooking(room, userId);
    } else {
      // ⚠️ ไม่มี userId (browser ไม่มี LINE context) → fallback login
      showFallback('ไม่พบข้อมูล LINE กรุณาเข้าสู่ระบบด้วยบัญชี NPU');
    }

  } catch(e) {
    // LIFF init failed → fallback
    showFallback('');
  }
}

// ─── Toggle password ──────────────────────────────────────────────────────────
document.getElementById('togglePass').addEventListener('click', function() {
  const inp = document.getElementById('password');
  const icon = document.getElementById('eyeIcon');
  inp.type = inp.type === 'password' ? 'text' : 'password';
  icon.className = inp.type === 'password' ? 'bi bi-eye' : 'bi bi-eye-slash';
});

// ─── Browser Login Form ───────────────────────────────────────────────────────
document.getElementById('loginForm').addEventListener('submit', async function(e) {
  e.preventDefault();
  document.getElementById('loginText').classList.add('d-none');
  document.getElementById('loginLoading').classList.remove('d-none');
  document.getElementById('loginBtn').disabled = true;

  const username = document.getElementById('username').value.trim();
  const password = document.getElementById('password').value;
  const userType = document.getElementById('userType').value;
  const room = getRoomFromUrl();

  try {
    const res = await fetch('{% url "liff_login" %}', {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'X-CSRFToken': getCookie('csrftoken')
      },
      body: JSON.stringify({ username, password, user_type: userType })
    });
    const data = await res.json();

    if (data.ok) {
      goToBooking(room, null);  // ไม่มี line_id แต่มี session
    } else {
      document.getElementById('errorText').textContent = data.error || 'username หรือ password ไม่ถูกต้อง';
      document.getElementById('errorMsg').classList.remove('d-none');
    }
  } catch(err) {
    document.getElementById('errorText').textContent = 'เกิดข้อผิดพลาด กรุณาลองใหม่';
    document.getElementById('errorMsg').classList.remove('d-none');
  } finally {
    document.getElementById('loginText').classList.remove('d-none');
    document.getElementById('loginLoading').classList.add('d-none');
    document.getElementById('loginBtn').disabled = false;
  }
});

function getCookie(name) {
  const v = document.cookie.match('(^|;) ?' + name + '=([^;]*)(;|$)');
  return v ? v[2] : null;
}

// ─── Start ────────────────────────────────────────────────────────────────────
initLiff();
</script>
</body>
</html>
