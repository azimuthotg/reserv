<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="1697" viewBox="0 0 1200 1697">
  <defs>
    <style>
      .thai { font-family: Tahoma, "Leelawadee UI", sans-serif; }
      .en { font-family: Tahoma, Arial, sans-serif; }
      .bold { font-weight: 700; }
      .center { text-anchor: middle; }
      .navy { fill: #073f7d; }
      .blue { fill: #0b5cad; }
      .gold { fill: #f2b705; }
      .goldText { fill: #a66b00; }
      .ink { fill: #12213a; }
      .muted { fill: #526579; }
    </style>
    <clipPath id="heroClip">
      <rect x="55" y="310" width="1090" height="610" rx="46"/>
    </clipPath>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="9" stdDeviation="12" flood-color="#061e44" flood-opacity="0.16"/>
    </filter>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="5" stdDeviation="7" flood-color="#061e44" flood-opacity="0.12"/>
    </filter>
  </defs>

  <rect width="1200" height="1697" fill="#fff8e7"/>

  <!-- Top identity band -->
  <path d="M0 0 H1200 V220 C990 258 760 210 540 238 C335 262 160 268 0 235 Z" fill="#073f7d"/>
  <circle cx="1060" cy="285" r="7" fill="#f2b705"/>
  <circle cx="1102" cy="345" r="5" fill="#a9d6ff"/>
  <path d="M1012 260 l18 9 -18 9 -9 18 -9 -18 -18 -9 18 -9 9 -18z" fill="#f2b705"/>

  <rect x="42" y="38" width="1116" height="154" rx="38" fill="#ffffff" filter="url(#shadow)"/>
  <image href="../logo_NPU.png" x="70" y="55" width="78" height="100" preserveAspectRatio="xMidYMid meet"/>
  <image href="../logo_ARC.png" x="164" y="60" width="88" height="88" preserveAspectRatio="xMidYMid meet"/>
  <text class="thai bold navy" x="282" y="96" font-size="33">สำนักวิทยบริการ มหาวิทยาลัยนครพนม</text>
  <text class="en" x="284" y="140" font-size="22" fill="#73551a">Smart Creative Learning Space Reservation</text>

  <!-- Main headline -->
  <text class="thai bold navy center" x="600" y="286" font-size="43">เปิดให้จองแล้ว</text>
  <text class="thai bold goldText center" x="600" y="360" font-size="60">Smart Creative Learning Space</text>
  <text class="thai bold ink center" x="600" y="414" font-size="31">พื้นที่เรียนรู้สร้างสรรค์ จองก่อนใช้บริการได้เลย</text>

  <!-- Hero section -->
  <rect x="55" y="445" width="1090" height="560" rx="46" fill="#eaf5ff" stroke="#b6d9ff" stroke-width="4" filter="url(#softShadow)"/>
  <image href="../front2.jpg" x="55" y="445" width="1090" height="560" opacity="0.22" preserveAspectRatio="xMidYMid slice" clip-path="url(#heroClip)"/>
  <path d="M55 895 C240 835 380 1025 570 940 C780 846 900 1010 1145 905 V1005 H55 Z" fill="#073f7d" opacity="0.10"/>

  <!-- Character card -->
  <rect x="92" y="500" width="340" height="438" rx="34" fill="#ffffff" stroke="#f2b705" stroke-width="5"/>
  <text class="thai bold navy center" x="262" y="545" font-size="28">มีเจ้าหน้าที่พร้อมแนะนำ</text>
  <image href="../personel_taan.jpg" x="145" y="578" width="235" height="294" preserveAspectRatio="xMidYMid meet"/>
  <text class="thai muted center" x="262" y="912" font-size="23">เริ่มง่าย ๆ ด้วยการสแกนจอง</text>

  <!-- Speech bubble / explanation -->
  <rect x="470" y="500" width="612" height="142" rx="35" fill="#ffffff" stroke="#073f7d" stroke-width="4"/>
  <text class="thai bold navy center" x="776" y="552" font-size="34">อยากใช้พื้นที่? จองคิวไว้ก่อน</text>
  <text class="thai ink center" x="776" y="600" font-size="26">เลือกช่องทาง เลือกวันเวลา แล้วมาใช้งานได้ตามแผน</text>

  <!-- Benefit cards -->
  <text class="thai bold navy center" x="776" y="702" font-size="34">จองแล้วใช้ทำอะไรได้บ้าง?</text>

  <rect x="470" y="735" width="280" height="112" rx="24" fill="#fff8e7" stroke="#f2b705" stroke-width="3"/>
  <circle cx="512" cy="791" r="27" fill="#073f7d"/>
  <text class="en bold center" x="512" y="801" font-size="22" fill="#ffffff">01</text>
  <text class="thai bold ink" x="560" y="780" font-size="25">อ่านหนังสือ</text>
  <text class="thai muted" x="560" y="814" font-size="21">ใช้พื้นที่เงียบ ๆ</text>

  <rect x="795" y="735" width="280" height="112" rx="24" fill="#fff8e7" stroke="#f2b705" stroke-width="3"/>
  <circle cx="837" cy="791" r="27" fill="#073f7d"/>
  <text class="en bold center" x="837" y="801" font-size="22" fill="#ffffff">02</text>
  <text class="thai bold ink" x="885" y="780" font-size="25">ทำงานกลุ่ม</text>
  <text class="thai muted" x="885" y="814" font-size="21">นัดเพื่อนล่วงหน้า</text>

  <rect x="470" y="870" width="280" height="112" rx="24" fill="#fff8e7" stroke="#f2b705" stroke-width="3"/>
  <circle cx="512" cy="926" r="27" fill="#073f7d"/>
  <text class="en bold center" x="512" y="936" font-size="22" fill="#ffffff">03</text>
  <text class="thai bold ink" x="560" y="915" font-size="25">สร้างสื่อ</text>
  <text class="thai muted" x="560" y="949" font-size="21">ใช้เครื่องมือดิจิทัล</text>

  <rect x="795" y="870" width="280" height="112" rx="24" fill="#fff8e7" stroke="#f2b705" stroke-width="3"/>
  <circle cx="837" cy="926" r="27" fill="#073f7d"/>
  <text class="en bold center" x="837" y="936" font-size="22" fill="#ffffff">04</text>
  <text class="thai bold ink" x="885" y="915" font-size="25">ฝึกทักษะ</text>
  <text class="thai muted" x="885" y="949" font-size="21">เรียนรู้ด้วยตัวเอง</text>

  <!-- Quick info ribbon -->
  <rect x="105" y="1030" width="990" height="96" rx="28" fill="#ffffff" stroke="#b6d9ff" stroke-width="3" filter="url(#softShadow)"/>
  <text class="thai bold navy center" x="310" y="1066" font-size="25">จองล่วงหน้าได้</text>
  <text class="thai bold goldText center" x="310" y="1105" font-size="34">ไม่เกิน 7 วันเปิดบริการ</text>
  <line x1="510" y1="1048" x2="510" y2="1112" stroke="#d8e8f7" stroke-width="3"/>
  <text class="thai bold navy center" x="770" y="1066" font-size="25">เปิดให้บริการ</text>
  <text class="thai ink center" x="770" y="1105" font-size="25">จ.-ศ. 08:30-16:30 | ส.-อา. 09:00-17:00</text>

  <!-- QR call-to-action -->
  <rect x="95" y="1165" width="1010" height="78" rx="39" fill="#073f7d"/>
  <text class="thai bold center" x="600" y="1217" font-size="45" fill="#ffffff">สแกนเพื่อเริ่มจอง</text>

  <rect x="128" y="1272" width="386" height="282" rx="34" fill="#ffffff" stroke="#f2b705" stroke-width="5" filter="url(#softShadow)"/>
  <text class="thai bold goldText center" x="321" y="1313" font-size="27">ช่องทางหลัก</text>
  <image href="../QR_LINEOA_ARC.jpg" x="215" y="1330" width="212" height="212" preserveAspectRatio="xMidYMid meet"/>
  <text class="thai bold navy center" x="321" y="1586" font-size="25">LINE OA สำนักวิทยบริการ</text>

  <rect x="686" y="1272" width="386" height="282" rx="34" fill="#ffffff" stroke="#0b5cad" stroke-width="5" filter="url(#softShadow)"/>
  <text class="thai bold blue center" x="879" y="1313" font-size="27">ช่องทางรอง</text>
  <image href="../QR_WebApp_ARC.png" x="773" y="1330" width="212" height="212" preserveAspectRatio="xMidYMid meet"/>
  <text class="thai bold navy center" x="879" y="1586" font-size="25">ระบบจองออนไลน์</text>

  <rect x="526" y="1306" width="148" height="190" rx="28" fill="#ffffff" stroke="#b6d9ff" stroke-width="3"/>
  <text class="thai bold navy center" x="600" y="1362" font-size="24">เลือก</text>
  <text class="thai bold navy center" x="600" y="1398" font-size="24">ช่องทาง</text>
  <text class="thai muted center" x="600" y="1445" font-size="20">LINE OA</text>
  <text class="thai muted center" x="600" y="1475" font-size="20">หรือเว็บไซต์</text>

  <!-- Support -->
  <rect x="738" y="1603" width="408" height="74" rx="24" fill="#fff1c7" stroke="#d6a12e" stroke-width="3"/>
  <image href="../personal_akeky.png" x="754" y="1610" width="58" height="58" preserveAspectRatio="xMidYMid meet"/>
  <text class="thai bold" x="828" y="1634" font-size="20" fill="#523800">ติดปัญหาการใช้งานระบบ</text>
  <text class="thai bold" x="828" y="1662" font-size="20" fill="#523800">ติดต่อเจ้าหน้าที่ดูแลระบบ</text>

  <text class="thai muted" x="75" y="1647" font-size="19">สำนักวิทยบริการ มหาวิทยาลัยนครพนม</text>
</svg>
