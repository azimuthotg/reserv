<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="1697" viewBox="0 0 1200 1697">
  <defs>
    <style>
      .bg { fill: #fcf8ef; }
      .navy { fill: #063b7a; }
      .blue { fill: #0b5cad; }
      .gold { fill: #f2b705; }
      .goldText { fill: #a66b00; }
      .ink { fill: #12213a; }
      .muted { fill: #4c617a; }
      .thai { font-family: Tahoma, "Leelawadee UI", sans-serif; }
      .en { font-family: Tahoma, Arial, sans-serif; }
      .bold { font-weight: 700; }
      .center { text-anchor: middle; }
    </style>
    <clipPath id="sceneClip">
      <rect x="70" y="560" width="1060" height="520" rx="42"/>
    </clipPath>
    <marker id="arrowGold" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M0,0 L12,6 L0,12 z" fill="#f2b705"/>
    </marker>
  </defs>

  <rect class="bg" x="0" y="0" width="1200" height="1697"/>

  <!-- Header -->
  <rect class="navy" x="0" y="0" width="1200" height="235"/>
  <rect x="38" y="36" width="1124" height="168" rx="42" fill="#ffffff"/>
  <image href="../logo_NPU.png" x="64" y="54" width="86" height="112" preserveAspectRatio="xMidYMid meet"/>
  <image href="../logo_ARC.png" x="166" y="60" width="96" height="96" preserveAspectRatio="xMidYMid meet"/>
  <text class="thai bold navy" x="292" y="96" font-size="34">สำนักวิทยบริการ มหาวิทยาลัยนครพนม</text>
  <text class="en" x="295" y="145" font-size="23" fill="#73551a">Smart Creative Learning Space Reservation</text>
  <text class="en bold" x="1046" y="57" font-size="26" fill="#ffffff" text-anchor="middle">LAYOUT DRAFT</text>

  <!-- Main message -->
  <text class="thai bold navy center" x="600" y="315" font-size="48">จองก่อน มาใช้พื้นที่ได้พอดีแผน</text>
  <text class="thai bold goldText center" x="600" y="385" font-size="58">Smart Creative Learning Space</text>
  <rect x="145" y="420" width="910" height="92" rx="32" fill="#ffffff" stroke="#b6d9ff" stroke-width="3"/>
  <text class="thai bold ink center" x="600" y="458" font-size="29">พื้นที่สำหรับเรียน ทำงานกลุ่ม สร้างสื่อ และฝึกทักษะ</text>
  <text class="thai muted center" x="600" y="492" font-size="24">สำหรับนักศึกษา อาจารย์ และบุคลากร มหาวิทยาลัยนครพนม</text>

  <!-- Service explanation -->
  <rect x="70" y="560" width="1060" height="520" rx="42" fill="#eff7ff" stroke="#b6d9ff" stroke-width="4"/>
  <image href="../front2.jpg" x="70" y="560" width="1060" height="520" opacity="0.18" preserveAspectRatio="xMidYMid slice" clip-path="url(#sceneClip)"/>

  <rect x="105" y="600" width="330" height="420" rx="30" fill="#ffffff" stroke="#f2b705" stroke-width="4"/>
  <text class="thai bold navy center" x="270" y="642" font-size="26">เจ้าหน้าที่พร้อมแนะนำ</text>
  <image href="../personel_taan.jpg" x="155" y="670" width="230" height="285" preserveAspectRatio="xMidYMid meet"/>
  <text class="thai muted center" x="270" y="986" font-size="21">ใช้บริการง่าย เริ่มจากการจอง</text>

  <text class="thai bold navy center" x="770" y="625" font-size="34">จองแล้วใช้ทำอะไรได้บ้าง?</text>

  <rect x="485" y="665" width="270" height="120" rx="24" fill="#fff8e7" stroke="#f2b705" stroke-width="3"/>
  <circle cx="525" cy="725" r="28" fill="#063b7a"/>
  <text class="en bold center" x="525" y="735" font-size="24" fill="#ffffff">01</text>
  <text class="thai bold ink" x="570" y="710" font-size="25">อ่านหนังสือ</text>
  <text class="thai muted" x="570" y="744" font-size="22">ใช้พื้นที่เงียบ ๆ</text>

  <rect x="800" y="665" width="270" height="120" rx="24" fill="#fff8e7" stroke="#f2b705" stroke-width="3"/>
  <circle cx="840" cy="725" r="28" fill="#063b7a"/>
  <text class="en bold center" x="840" y="735" font-size="24" fill="#ffffff">02</text>
  <text class="thai bold ink" x="885" y="710" font-size="25">ทำงานกลุ่ม</text>
  <text class="thai muted" x="885" y="744" font-size="22">นัดเพื่อนล่วงหน้า</text>

  <rect x="485" y="820" width="270" height="120" rx="24" fill="#fff8e7" stroke="#f2b705" stroke-width="3"/>
  <circle cx="525" cy="880" r="28" fill="#063b7a"/>
  <text class="en bold center" x="525" y="890" font-size="24" fill="#ffffff">03</text>
  <text class="thai bold ink" x="570" y="865" font-size="25">สร้างสื่อ</text>
  <text class="thai muted" x="570" y="899" font-size="22">ใช้เครื่องมือดิจิทัล</text>

  <rect x="800" y="820" width="270" height="120" rx="24" fill="#fff8e7" stroke="#f2b705" stroke-width="3"/>
  <circle cx="840" cy="880" r="28" fill="#063b7a"/>
  <text class="en bold center" x="840" y="890" font-size="24" fill="#ffffff">04</text>
  <text class="thai bold ink" x="885" y="865" font-size="25">ฝึกทักษะ</text>
  <text class="thai muted" x="885" y="899" font-size="22">เรียนรู้ด้วยตัวเอง</text>

  <path d="M470 1000 C600 1060, 760 1060, 930 1000" fill="none" stroke="#f2b705" stroke-width="8" stroke-linecap="round" marker-end="url(#arrowGold)"/>
  <text class="thai bold goldText center" x="700" y="1030" font-size="26">เห็นประโยชน์ก่อน แล้วค่อยสแกน</text>

  <!-- QR entry points -->
  <rect x="95" y="1125" width="1010" height="76" rx="38" class="navy"/>
  <text class="thai bold center" x="600" y="1176" font-size="46" fill="#ffffff">สแกนเพื่อเริ่มจอง</text>

  <rect x="140" y="1240" width="360" height="270" rx="34" fill="#ffffff" stroke="#f2b705" stroke-width="5"/>
  <text class="thai bold goldText center" x="320" y="1280" font-size="26">ช่องทางหลัก</text>
  <image href="../QR_LINEOA_ARC.jpg" x="218" y="1300" width="205" height="205" preserveAspectRatio="xMidYMid meet"/>
  <text class="thai bold navy center" x="320" y="1538" font-size="25">LINE OA สำนักวิทยบริการ</text>

  <rect x="700" y="1240" width="360" height="270" rx="34" fill="#ffffff" stroke="#0b5cad" stroke-width="5"/>
  <text class="thai bold blue center" x="880" y="1280" font-size="26">ช่องทางรอง</text>
  <image href="../QR_WebApp_ARC.png" x="778" y="1300" width="205" height="205" preserveAspectRatio="xMidYMid meet"/>
  <text class="thai bold navy center" x="880" y="1538" font-size="25">ระบบจองออนไลน์</text>

  <rect x="525" y="1265" width="150" height="215" rx="28" fill="#ffffff" stroke="#b6d9ff" stroke-width="3"/>
  <text class="thai bold navy center" x="600" y="1325" font-size="24">เลือก</text>
  <text class="thai bold navy center" x="600" y="1362" font-size="24">ช่องทาง</text>
  <text class="thai muted center" x="600" y="1410" font-size="20">LINE OA</text>
  <text class="thai muted center" x="600" y="1440" font-size="20">หรือเว็บไซต์</text>

  <!-- Support corner -->
  <rect x="760" y="1570" width="378" height="92" rx="25" fill="#fff1c7" stroke="#d6a12e" stroke-width="3"/>
  <image href="../personal_akeky.png" x="778" y="1581" width="70" height="70" preserveAspectRatio="xMidYMid meet"/>
  <text class="thai bold" x="865" y="1607" font-size="21" fill="#523800">ติดปัญหาการใช้งานระบบ</text>
  <text class="thai bold" x="865" y="1638" font-size="21" fill="#523800">ติดต่อเจ้าหน้าที่ดูแลระบบ</text>

  <text class="thai muted" x="78" y="1658" font-size="20">Layout draft สำหรับตรวจข้อความ ตำแหน่งโลโก้ และการสแกน QR ยังไม่ใช่ไฟล์พิมพ์จริง</text>
</svg>
